<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Bookmarks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <div class="masthead">
        <span class="masthead-label">COLLECTION</span>
        <h1 class="masthead-title">GitHub<br/><em>Bookmarks</em></h1>
      </div>

      <div class="add-form">
        <div class="input-row">
          <div class="input-wrapper">
            <input
              type="text"
              id="url-input"
              placeholder="github.com/owner/repository"
              autocomplete="off"
              spellcheck="false"
              aria-label="GitHub repository URL"
            />
          </div>
          <div class="input-wrapper input-wrapper--category">
            <input
              type="text"
              id="category-input"
              placeholder="Category (optional)"
              autocomplete="off"
              spellcheck="false"
              aria-label="Category"
              list="category-suggestions"
            />
            <datalist id="category-suggestions"></datalist>
          </div>
        </div>
        <div id="suggestions" class="suggestions hidden" aria-live="polite"></div>
        <button id="add-btn" aria-label="Add bookmark">
          ADD &nbsp;→
        </button>
      </div>
    </div>

    <p id="error-msg" class="error-msg hidden" role="alert"></p>
    <div class="header-rule"></div>
  </header>

  <!-- ── Filter bar ───────────────────────────────────────────────── -->
  <div id="filter-bar" class="filter-bar hidden">
    <div class="filter-bar-inner">
      <button class="filter-tab active" data-category="__all__">ALL</button>
    </div>
  </div>

  <!-- ── Toolbar: search + sort ────────────────────────────────────── -->
  <div id="toolbar" class="toolbar hidden">
    <div class="toolbar-inner">
      <div class="search-wrapper">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input
          type="search"
          id="search-input"
          placeholder="Search repos, descriptions, languages…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search bookmarks"
        />
        <button id="search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
      </div>
      <div class="sort-wrapper">
        <label for="sort-select" class="sort-label">SORT</label>
        <select id="sort-select" aria-label="Sort bookmarks">
          <option value="date">Date Added</option>
          <option value="alpha">A → Z</option>
          <option value="stars">Most Stars</option>
        </select>
      </div>
    </div>
    <p id="search-result-count" class="search-result-count hidden" aria-live="polite"></p>
  </div>

  <main id="main-content">

    <div id="empty-state" class="empty-state hidden">
      <span class="empty-rule"></span>
      <p class="empty-headline">Begin your<br/><em>archive.</em></p>
      <p class="empty-sub">Paste any GitHub repository URL above<br/>to add it to your collection.</p>
      <span class="empty-rule"></span>
    </div>

    <div id="grid" class="grid"></div>

  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-count" id="footer-count"></span>
      <span class="footer-brand">GitHub Bookmarks</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
